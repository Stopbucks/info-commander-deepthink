name: GHA Deep Rethink (議題深度再思產線)

on:
  # 1. 允許 Vercel 透過 API 隨時瞬間喚醒 (隨選即戰)
  repository_dispatch:
    types: [trigger-deep-rethink]
  
  # 2. 保底巡邏：每日台北時間 05:43 啟動，處理之前滿載失敗的任務
schedule:
    - cron: '43 21 * * *'
    
  # 3. 允許從 GitHub UI 手動啟動
  workflow_dispatch: 

jobs:
  deep_rethink_mission:
    runs-on: ubuntu-latest
    timeout-minutes: 130 # 建立防爆防禦：若執行超過 130 分鐘則自動終止

    steps:
    - name: Checkout repository # 檢出目前的程式碼倉庫
      uses: actions/checkout@v4

    - name: Set up Python 3.10 # 部署 Python 運行環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 使用快取加速套件安裝過程

    - name: Install Dependencies # 安裝必要的武器套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Execute Rethink Mission # 執行 Python 核心逆向工程程式碼
      env:
        WORKER_ID: "DEEP_RETHINK_STATION" # 標記此任務節點代號
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}  
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}  
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}  
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}  
        R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}  
      run: |
        python deep_rethink_mission.py # 啟動核心邏輯
